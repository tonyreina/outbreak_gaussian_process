[workspace]
name = "gp-movid-animation"
version = "0.1.0"
description = "Gaussian Process regression animation — MOVID-19 outbreak example with vaccine rollout & Omicron surge"
authors = ["Exthymic"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.11"
numpy = ">=1.26"
matplotlib = ">=3.8"
scikit-learn = ">=1.4"
ffmpeg = ">=6.0"       # provides the ffmpeg binary used by matplotlib's FFMpegWriter
tqdm = ">=4.0"

[tasks]
render = { cmd = "python movid_forecasting_example.py", description = "Render the animation movie into the current directory" }
